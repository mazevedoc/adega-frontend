<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Adega ERP</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined" rel="stylesheet">
    
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/login.css">

    <link rel="icon" href="../assets/images/favicon.ico" type="image/x-icon">
</head>
<body class="login-page-active">

    <div class="login-page-wrapper">
        <div class="login-flipper-container">
            <div class="login-card shadow-lg" id="flipperCard">

                <div class="login-card-face login-card-front">
                    <div class="login-header text-center mb-4">
                        <h2 class="fw-bold login-title">Adega ERP</h2>
                        <p class="text-muted login-subtitle">Acesse sua conta para gerenciar.</p>
                    </div>
                    <form id="loginForm">
                        <div class="mb-3 form-floating">
                            <input type="email" class="form-control" name="loginEmail" id="loginEmail" placeholder=" " required>
                            <label for="loginEmail">
                                <span class="material-icons-outlined align-middle me-1">alternate_email</span>
                                Email ou Usuário
                            </label>
                        </div>
                        
                        <div class="mb-3 form-floating position-relative">
                            <input type="password" class="form-control" name="loginPassword" id="loginPassword" placeholder=" " required>
                            <label for="loginPassword">
                                <span class="material-icons-outlined align-middle me-1">lock</span>
                                Senha
                            </label>
                            <span class="material-icons-outlined password-toggle-icon" 
                                  data-target-input="loginPassword" 
                                  title="Mostrar/Ocultar senha">
                                visibility_off
                            </span>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">Lembrar-me</label>
                            </div>
                            <a href="#" class="forgot-password-link small">Esqueceu a senha?</a>
                        </div>
                        <button type="submit" class="btn btn-lg w-100 login-btn">
                            <span class="material-icons-outlined align-middle me-1">login</span>
                            Entrar
                        </button>
                    </form>
                    <div class="login-footer-links text-center mt-auto pt-3">
                        <p class="text-muted small mb-0">Não tem uma conta?
                            <a href="#" class="register-link fw-medium" id="showRegisterForm">Crie uma agora!</a>
                        </p>
                    </div>
                </div>

                <div class="login-card-face login-card-back">
                    <div class="login-header text-center mb-3">
                        <h2 class="fw-bold login-title">Criar Nova Conta</h2>
                        <p class="text-muted login-subtitle">Preencha os campos abaixo.</p>
                    </div>
                    <form id="registerForm">
                        <div class="mb-3 form-floating">
                            <input type="text" class="form-control" name="registerName" id="registerName" placeholder=" " required>
                            <label for="registerName">
                                <span class="material-icons-outlined align-middle me-1">badge</span>
                                Nome Completo
                            </label>
                        </div>
                        <div class="mb-3 form-floating">
                            <input type="email" class="form-control" name="registerEmail" id="registerEmail" placeholder=" " required>
                            <label for="registerEmail">
                                <span class="material-icons-outlined align-middle me-1">alternate_email</span>
                                Email
                            </label>
                        </div>

                        <div class="mb-3 form-floating position-relative">
                            <input type="password" class="form-control" name="registerPassword" id="registerPassword" placeholder=" " required>
                            <label for="registerPassword">
                                <span class="material-icons-outlined align-middle me-1">lock_outline</span>
                                Senha
                            </label>
                            <span class="material-icons-outlined password-toggle-icon" 
                                  data-target-input="registerPassword"
                                  title="Mostrar/Ocultar senha">
                                visibility_off
                            </span>
                        </div>

                        <div class="mb-3 form-floating position-relative">
                            <input type="password" class="form-control" name="registerConfirmPassword" id="registerConfirmPassword" placeholder=" " required>
                            <label for="registerConfirmPassword">
                                <span class="material-icons-outlined align-middle me-1">password</span>
                                Confirmar Senha
                            </label>
                            <span class="material-icons-outlined password-toggle-icon" 
                                  data-target-input="registerConfirmPassword"
                                  title="Mostrar/Ocultar senha">
                                visibility_off
                            </span>
                        </div>

                        <div class="mb-3 form-floating">
                            <select class="form-select" name="registerRole" id="registerRole" required>
                                <option value="" disabled selected>Selecione o papel...</option>
                                <option value="admin">Administrador</option>
                                <option value="gerente">Gerente</option>
                                <option value="funcionario">Funcionário</option>
                            </select>
                            <label for="registerRole">
                                <span class="material-icons-outlined align-middle me-1">assignment_ind</span>
                                Papel (Cargo)
                            </label>
                        </div>
                        <button type="submit" class="btn btn-lg w-100 login-btn register-btn mt-3">
                             <span class="material-icons-outlined align-middle me-1">person_add</span>
                            Cadastrar
                        </button>
                    </form>
                    <div class="login-footer-links text-center mt-auto pt-3">
                        <p class="text-muted small mb-0">Já possui uma conta?
                            <a href="#" class="login-link fw-medium" id="showLoginForm">Entrar</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="app-footer text-center">
        <p>&copy; <span id="currentYear"></span> Adega ERP. Todos os direitos reservados.</p>
    </footer>
    
    <script type="module">
        import { initAuthPage } from '../controllers/authController.js';
        initAuthPage();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
